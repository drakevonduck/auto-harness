name: Harness Checks

# Runs on every PR and push to main.
# Validates governance requirements: placeholder resolution and doc companions.
# Stack-specific lint/test/build runs in stack.yml (see profiles/).

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

jobs:
  # ── Job 1: Placeholder validation ─────────────────────────────────────────
  validate-placeholders:
    name: Validate Placeholders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run placeholder validation
        run: bash scripts/validate-placeholders.sh

  # ── Job 2: Doc companion enforcement ──────────────────────────────────────
  doc-companions:
    name: Doc Companion Check
    runs-on: ubuntu-latest
    # Only meaningful on PRs — skip on direct pushes to main
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Run doc companion check
        run: bash scripts/check-doc-companions.sh ${{ github.base_ref }}

  # ── Job 3: Stack-specific checks (hook point) ──────────────────────────────
  # This job is a placeholder for stack-specific checks.
  # Replace the "echo" steps with real commands from your active stack profile.
  # See profiles/node-typescript.md or profiles/python.md for command examples.
