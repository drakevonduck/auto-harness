id: web3
type: domain
version: 2.0.0
summary: Web3 domain overlay for blockchain-integrated systems — chain data access, smart contract boundaries, token and governance layers, UNKNOWN state propagation, and irreversibility governance.
dependsOn:
  - kernel/base
conflictsWith: []
requiredArtifacts:
  - docs/web3/chain-config.md
optionalArtifacts:
  - docs/web3/contract-registry.md
  - docs/web3/token-strategy.md
  - docs/architecture/overview.md
  - docs/security/risk-register.md
sensitivePaths:
  - description: Smart contract source and ABI surfaces
    patterns:
      - ^contracts/
      - ^abi/
      - ^src/contracts/
  - description: Wallet integration and signing surfaces
    patterns:
      - ^wallet/
      - ^src/wallet/
      - ^src/signing/
  - description: Chain configuration and multi-chain routing
    patterns:
      - ^chain/
      - ^src/chain/
      - ^src/client/
      - chain_config
      - chain_registry
  - description: Scoring and signal rules (risk analytics platforms)
    patterns:
      - scoring_rules
      - signal_weights
      - ^src/scoring/
      - ^src/signals/
      - ^src/agents/
companionRules:
  - description: Chain configuration changes require an ADR — chain selection is an architectural decision with long-term lock-in
    triggerPaths:
      - ^chain/
      - ^src/chain/
      - ^src/client/
      - chain_config
      - chain_registry
    requiredAny:
      - ^docs/adr/ADR-
    humanReview: Reviewers verify rate limit budget, explorer API compatibility, and multi-chain expansion implications of the change.
  - description: Contract or wallet surface changes require risk or architecture updates
    triggerPaths:
      - ^contracts/
      - ^abi/
      - ^src/contracts/
      - ^wallet/
      - ^src/wallet/
      - ^src/signing/
    requiredAny:
      - ^docs/security/risk-register\.md$
      - ^docs/architecture/overview\.md$
      - ^docs/adr/ADR-
    humanReview: Reviewers verify key-management, signing authority, and irreversibility implications. Smart contract changes cannot be patched after deployment.
  - description: Scoring or signal rule changes require an ADR — determinism and explainability are hard requirements
    triggerPaths:
      - scoring_rules
      - signal_weights
      - ^src/scoring/
      - ^src/signals/
    requiredAny:
      - ^docs/adr/ADR-
    humanReview: Reviewers verify that UNKNOWN propagation is preserved, evidence requirements are met, and determinism is not broken.
validators:
  - validate-required-artifacts
  - validate-companions
reviewGates:
  - Human review is required for any transaction-signing or state-writing operation — writes to a blockchain are irreversible. Read-only analysis does not require this gate.
  - UNKNOWN state propagation must be verified — a signal that cannot be computed must return UNKNOWN, not zero, null, or a synthetic default. Suppressing UNKNOWN is a correctness bug.
  - Evidence requirement — every risk flag or scored signal in system output must reference the specific on-chain data that produced it. Unexplained scores are not acceptable.
  - Rate limit budget — every new external API call must be counted against the declared rate limit budget in chain-config.md. Adding calls without updating the budget is an architecture gap.
agentAdapters:
  - platform/agents/base
compiledFragments:
  - platform/profiles/domains/web3/README.md
recommendedSkills:
  # -----------------------------------------------------------------------
  # NOTE: Web3 skills are NOT in the curated awesome-openclaw-skills list.
  # They are available from the full ClawHub registry (clawskills.sh).
  # SECURITY WARNING: Most Web3 skills are early experimental versions and
  # may contain unknown vulnerabilities. Always run azhua-skill-vetter first.
  # Never deploy skills touching live transaction signing without security review.
  # See platform/workflow/skills-and-agents.md §Web3.
  # -----------------------------------------------------------------------

  # Security — install first (azhua-skill-vetter IS in the curated list)
  - azhua-skill-vetter   # security-first vetting before installing any other skill
  - goplus-agent-guard   # real-time threat blocking; pre-execution safety (full registry)
  - mist-track           # address risk analysis and AML compliance (full registry)

  # On-chain data (analytics/read-only platforms)
  - dune-mcp             # on-chain data querying via Dune MCP server (full registry)
  - nansen               # wallet and token analytics (full registry)

  # Write-capable platforms only — commented out by default; uncomment when in scope
  # - clawnch             # ERC-20 deployment on Base (full registry)
  # - okx-onchain-os      # 20+ chain wallet/transaction surface (full registry)
